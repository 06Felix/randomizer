name: Release

on:
  push:
    tags:
      - "v*" # trigger only on version tags

permissions:
  contents: write # required to create GitHub releases

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            archive: zip

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT for git-cliff

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (only when needed)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          APP_NAME="randomizer"
          VERSION=${GITHUB_REF#refs/tags/}

          mkdir -p dist

          BIN_PATH="target/${{ matrix.target }}/release/$APP_NAME"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            BIN_PATH="$BIN_PATH.exe"
          fi

          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found: $BIN_PATH"
            exit 1
          fi

          cp "$BIN_PATH" dist/

          # Optional strip (safe if available)
          strip "$BIN_PATH" || true

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "$APP_NAME-$VERSION-${{ matrix.target }}.zip" dist
          else
            tar -czf "$APP_NAME-$VERSION-${{ matrix.target }}.tar.gz" -C dist .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog (git-cliff)
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
